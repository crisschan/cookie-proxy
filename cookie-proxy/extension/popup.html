<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><title>Cookie Proxy</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;width:280px;background:#1a1a2e;color:#e0e0e0}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #2a2a3e}
.title{font-weight:600;font-size:15px}
.status{display:flex;align-items:center;gap:6px;font-size:12px;color:#aaa}
.dot{width:8px;height:8px;border-radius:50%;background:#555}
.dot.ok{background:#27ae60}.dot.err{background:#e74c3c}
.sec{padding:12px 16px}
.lbl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#666;margin-bottom:8px}
.item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #22223a}
.item:last-child{border-bottom:none}
.del{background:none;border:1px solid #444;color:#888;font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer}
.del:hover{border-color:#e74c3c;color:#e74c3c}
.empty{color:#555;font-size:13px;font-style:italic}
</style></head>
<body>
<div class="hdr"><span class="title">🔐 Cookie Proxy</span>
<div class="status"><div class="dot" id="dot"></div><span id="st">检查中…</span></div></div>
<div class="sec"><div class="lbl">已信任的域名</div><div id="wl"></div></div>
<script src="popup.js"></script></body></html>
