<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><title>Cookie Proxy — 权限确认</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px;min-height:260px;display:flex;flex-direction:column}
.hdr{font-size:16px;font-weight:600;margin-bottom:6px}
.desc{font-size:13px;color:#aaa;margin-bottom:14px}
.box{background:#0f3460;border-radius:8px;padding:12px 16px;margin-bottom:20px}
.site{font-weight:700;font-size:15px;color:#e94560}
.path{color:#888;font-size:12px;margin-top:4px}
.btns{display:flex;gap:8px;margin-top:auto}
button{flex:1;padding:10px 6px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500}
button:hover{opacity:.82}
.a{background:#27ae60;color:#fff}.b{background:#2980b9;color:#fff}.c{background:#444;color:#ccc}
</style></head>
<body>
<div class="hdr">🔐 Cookie Proxy</div>
<div class="desc">Claude Code 想借用你的浏览器登录状态访问：</div>
<div class="box"><div class="site" id="site">-</div><div class="path" id="path">-</div></div>
<div class="btns">
  <button class="a" id="ba">允许此域名</button>
  <button class="b" id="bb">仅允许一次</button>
  <button class="c" id="bc">拒绝</button>
</div>
<script src="confirm.js"></script></body></html>
